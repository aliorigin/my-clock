<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ساعت هوشمند نئون</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
	<style>
		/* ─── فونت ایران سنس با fallback مناسب ─── */
		@font-face {
			font-family: 'IranSans';
			src: url('https://cdn.jsdelivr.net/gh/rastikerdar/iran-sans@v5.0.1/dist/font-face.css');
			font-display: swap;
		}

		:root {
			--color: #00FFFF;
			--color-alpha50: rgba(0,255,255,0.5);
			--color-alpha10: rgba(0,255,255,0.1);
			--color-alpha20: rgba(0,255,255,0.2);
			--color-alpha03: rgba(0,255,255,0.03);
			--color-pink: #FF00FF;
			--color-green: #00FF00;
			--glow-blur: 20px;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html {
			height: 100%;
		}

		body {
			min-height: 100%;
			background: #000000;
			font-family: 'IranSans', 'Tahoma', 'Arial Unicode MS', sans-serif;
			color: #FFFFFF;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: flex-start;
			padding: 15px 15px 80px;
			position: relative;
			overflow-x: hidden;
			overflow-y: auto;
		}

		/* ─── پس‌زمینه متحرک ─── */
		body::before {
			content: '';
			position: fixed;
			inset: 0;
			background: 
				radial-gradient(circle at 20% 30%, var(--color-alpha03) 0%, transparent 50%),
				radial-gradient(circle at 80% 70%, rgba(255,0,255,0.03) 0%, transparent 50%);
			animation: bgPulse 8s ease-in-out infinite;
			z-index: 0;
			pointer-events: none;
		}

		@keyframes bgPulse {
			0%, 100% { opacity: 0.5; }
			50% { opacity: 1; }
		}

		/* ─── کانتینر اصلی ─── */
		.container {
			position: relative;
			z-index: 1;
			text-align: center;
			width: 100%;
			max-width: 1100px;
			display: flex;
			flex-direction: column;
			gap: 20px;
			padding-top: 10px;
		}

		/* ─── جمله انگیزشی ─── */
		.quote-box {
			font-size: clamp(13px, 2.2vw, 18px);
			color: #FFFFFF;
			font-family: 'IranSans', 'Tahoma', sans-serif;
			font-weight: 400;
			line-height: 1.9;
			background: rgba(0,0,0,0.85);
			border: 2px solid var(--color);
			border-radius: 18px;
			padding: 20px 28px 16px;
			position: relative;
			box-shadow: 
				0 0 20px var(--color-alpha50),
				inset 0 0 20px var(--color-alpha10);
			transition: border-color 0.5s ease, box-shadow 0.5s ease;
			max-width: 900px;
			margin: 0 auto;
			animation: fadeInUp 0.8s ease-out backwards;
		}

		/* نقل‌قول دکوراتیو با span به جای pseudo-element ─── */
		.quote-mark-open,
		.quote-mark-close {
			position: absolute;
			font-size: 55px;
			color: var(--color);
			opacity: 0.25;
			font-family: Georgia, serif;
			line-height: 1;
			transition: color 0.5s ease;
			pointer-events: none;
			user-select: none;
		}

		.quote-mark-open {
			top: -8px;
			right: 16px;
		}

		.quote-mark-close {
			bottom: -22px;
			left: 16px;
		}

		.quote-text {
			display: block;
			margin-bottom: 8px;
			text-align: justify;
			padding: 0 4px;
		}

		.quote-author {
			display: block;
			font-size: clamp(11px, 1.6vw, 14px);
			color: var(--color);
			text-align: left;
			font-style: italic;
			opacity: 0.9;
			transition: color 0.5s ease;
		}

		/* ─── بخش ساعت ─── */
		.clock-section {
			background: rgba(0,0,0,0.85);
			border: 2px solid var(--color);
			border-radius: 18px;
			padding: 25px 20px;
			box-shadow: 
				0 0 20px var(--color-alpha50),
				inset 0 0 20px var(--color-alpha10);
			transition: border-color 0.5s ease, box-shadow 0.5s ease;
			animation: fadeInUp 0.6s ease-out 0.1s backwards;
		}

		#clocktext {
			font-size: clamp(52px, 14vw, 170px);
			font-weight: 700;
			letter-spacing: 0.08em;
			color: var(--color);
			font-family: 'IranSans', 'Tahoma', monospace;
			transition: color 0.5s ease, text-shadow 0.3s ease;
			display: block;
			line-height: 1;
		}

		/* ─── بخش تاریخ ─── */
		.date-section {
			background: rgba(0,0,0,0.85);
			border: 2px solid var(--color-pink);
			border-radius: 18px;
			padding: 20px;
			box-shadow: 
				0 0 20px rgba(255,0,255,0.5),
				inset 0 0 20px rgba(255,0,255,0.1);
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 15px;
			animation: fadeInUp 0.6s ease-out 0.2s backwards;
		}

		.date-item {
			padding: 12px 10px;
			background: rgba(255,0,255,0.05);
			border-radius: 10px;
			border: 1px solid rgba(255,0,255,0.3);
		}

		.date-label {
			font-size: clamp(12px, 1.8vw, 16px);
			color: var(--color-pink);
			margin-bottom: 6px;
			text-shadow: 0 0 8px var(--color-pink);
		}

		.date-value {
			font-size: clamp(13px, 2vw, 20px);
			font-weight: 700;
			color: #FFFFFF;
			transition: text-shadow 0.3s ease;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		#shamsiDate, #miladiDate {
			font-family: 'IranSans', 'Tahoma', sans-serif;
		}

		#ghamariDate {
			font-family: 'Amiri', 'Traditional Arabic', serif;
			font-size: clamp(12px, 1.8vw, 18px);
		}

		/* ─── بخش اطلاعات ─── */
		.info-section {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 15px;
			animation: fadeInUp 0.6s ease-out 0.3s backwards;
		}

		.info-section-row2 {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 15px;
			animation: fadeInUp 0.6s ease-out 0.4s backwards;
		}

		.info-box {
			background: rgba(0,0,0,0.85);
			border: 2px solid;
			border-radius: 18px;
			padding: 18px 12px;
			transition: all 0.5s ease;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 90px;
		}

		.info-box:hover {
			transform: translateY(-4px);
		}

		#daysPassed {
			border-color: var(--color-green);
			box-shadow: 
				0 0 20px rgba(0,255,0,0.5),
				inset 0 0 20px rgba(0,255,0,0.1);
		}

		#daysAlone {
			border-color: #9B30FF;
			box-shadow: 
				0 0 20px rgba(155,48,255,0.5),
				inset 0 0 20px rgba(155,48,255,0.1);
		}

		#daysAlone .info-value {
			color: #BF7FFF;
		}

		#daysBack {
			border-color: #1E90FF;
			box-shadow: 
				0 0 20px rgba(30,144,255,0.5),
				inset 0 0 20px rgba(30,144,255,0.1);
		}

		#daysBack .info-value {
			color: #6AB8FF;
		}

		.info-text {
			font-size: clamp(13px, 1.8vw, 18px);
			line-height: 1.9;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			flex-wrap: wrap;
			gap: 4px;
		}

		.info-value {
			font-weight: 700;
			font-size: clamp(16px, 2.5vw, 22px);
			display: inline-block;
			margin: 0 4px;
			padding: 2px 10px;
			border-radius: 8px;
			background: rgba(255,255,255,0.08);
			font-family: 'IranSans', 'Tahoma', monospace;
			transition: all 0.3s ease;
		}

		#daysPassed .info-value {
			color: var(--color-green);
		}

		/* ─── دکمه‌های کنترل ─── */
		.controls-container {
			position: fixed;
			bottom: 18px;
			left: 18px;
			display: flex;
			gap: 10px;
			z-index: 100;
		}

		.control-btn {
			width: 44px;
			height: 44px;
			border-radius: 50%;
			background: rgba(0,0,0,0.85);
			border: 2px solid var(--color);
			color: var(--color);
			cursor: pointer;
			font-size: 20px;
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 0 12px var(--color-alpha50);
			transition: all 0.3s ease;
		}

		.control-btn:hover {
			transform: scale(1.12);
			box-shadow: 0 0 22px var(--color-alpha50);
		}

		.control-btn:active {
			transform: scale(0.93);
		}

		/* ─── پنل‌های modal ─── */
		.modal-overlay {
			position: fixed;
			inset: 0;
			background: rgba(0,0,0,0.6);
			z-index: 200;
			display: none;
			align-items: center;
			justify-content: center;
			padding: 15px;
		}

		.modal-overlay.active {
			display: flex;
			animation: overlayFadeIn 0.25s ease-out;
		}

		@keyframes overlayFadeIn {
			from { opacity: 0; }
			to { opacity: 1; }
		}

		.modal-panel {
			background: rgba(0,0,0,0.97);
			border: 2px solid var(--color);
			border-radius: 20px;
			padding: 28px 24px;
			width: 100%;
			max-width: 520px;
			max-height: 88vh;
			overflow-y: auto;
			box-shadow: 0 0 40px var(--color-alpha50);
			animation: modalSlideIn 0.3s ease-out;
			position: relative;
		}

		.modal-panel.wide {
			max-width: 950px;
		}

		@keyframes modalSlideIn {
			from {
				opacity: 0;
				transform: translateY(-20px) scale(0.97);
			}
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		.modal-panel::-webkit-scrollbar { width: 7px; }
		.modal-panel::-webkit-scrollbar-track { background: rgba(255,255,255,0.08); border-radius: 4px; }
		.modal-panel::-webkit-scrollbar-thumb { background: var(--color); border-radius: 4px; }

		.modal-title {
			font-size: clamp(22px, 4vw, 32px);
			font-weight: 700;
			text-align: center;
			margin-bottom: 22px;
			color: var(--color);
			text-shadow: 0 0 12px var(--color);
		}

		/* ─── تنظیمات ─── */
		.setting-item {
			margin-bottom: 18px;
		}

		.setting-label {
			display: block;
			color: var(--color);
			font-size: 14px;
			margin-bottom: 7px;
			text-shadow: 0 0 5px var(--color);
		}

		.slider {
			width: 100%;
			height: 6px;
			border-radius: 3px;
			background: rgba(255,255,255,0.15);
			outline: none;
			-webkit-appearance: none;
			cursor: pointer;
		}

		.slider::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 16px;
			height: 16px;
			border-radius: 50%;
			background: var(--color);
			cursor: pointer;
			box-shadow: 0 0 8px var(--color);
		}

		.slider::-moz-range-thumb {
			width: 16px;
			height: 16px;
			border-radius: 50%;
			background: var(--color);
			cursor: pointer;
			border: none;
			box-shadow: 0 0 8px var(--color);
		}

		.color-mode-toggle {
			display: flex;
			gap: 10px;
			margin-bottom: 10px;
		}

		.mode-btn {
			flex: 1;
			padding: 8px 12px;
			border-radius: 8px;
			background: rgba(255,255,255,0.07);
			border: 2px solid rgba(0,255,255,0.25);
			color: var(--color);
			cursor: pointer;
			font-size: 13px;
			transition: all 0.3s ease;
			font-family: 'IranSans', 'Tahoma', sans-serif;
		}

		.mode-btn.active {
			background: rgba(0,255,255,0.2);
			border-color: var(--color);
			box-shadow: 0 0 8px var(--color-alpha50);
		}

		.color-options {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.color-option {
			width: 38px;
			height: 38px;
			border-radius: 50%;
			cursor: pointer;
			border: 2px solid transparent;
			transition: all 0.3s ease;
		}

		.color-option:hover { transform: scale(1.12); }

		.color-option.active {
			border-color: #FFFFFF;
			box-shadow: 0 0 12px currentColor;
		}

		.close-btn {
			display: block;
			margin: 18px auto 0;
			width: 46px;
			height: 46px;
			border-radius: 50%;
			background: rgba(0,0,0,0.8);
			border: 2px solid var(--color);
			color: var(--color);
			font-size: 22px;
			font-weight: 700;
			cursor: pointer;
			box-shadow: 0 0 12px var(--color-alpha50);
			transition: all 0.3s ease;
		}

		.close-btn:hover {
			transform: scale(1.1);
			box-shadow: 0 0 22px var(--color-alpha50);
		}

		.schedule-nav-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			direction: ltr;
			margin-top: 18px;
		}

		.schedule-nav-row .close-btn {
			margin: 0;
		}

		.nav-btn {
			font-size: 20px;
		}

		.day-running-badge {
			display: inline-block;
			margin-right: 8px;
			font-size: 0.6em;
			color: #00FF00;
			vertical-align: middle;
		}

		.study-priorities-box {
			margin-top: 16px;
			padding: 14px 16px;
			background: rgba(255,255,255,0.04);
			border-radius: 12px;
			border: 1px solid var(--color-alpha20);
		}

		.study-priorities-box ul {
			list-style: none;
			display: flex;
			flex-wrap: wrap;
			gap: 8px 16px;
			margin-top: 8px;
			font-size: clamp(11px, 1.8vw, 14px);
		}

		.study-priorities-box li::before {
			content: '◆ ';
			color: var(--color);
		}

		/* ─── جدول برنامه ─── */
		.schedule-table {
			width: 100%;
			border-collapse: collapse;
			margin-bottom: 20px;
		}

		.schedule-table th,
		.schedule-table td {
			border: 1px solid var(--color);
			padding: 11px 14px;
			text-align: right;
			color: #FFFFFF;
		}

		.schedule-table th {
			background: var(--color-alpha20);
			font-weight: 700;
			font-size: clamp(13px, 2vw, 17px);
			color: var(--color);
			text-shadow: 0 0 8px var(--color);
		}

		.schedule-table td {
			font-size: clamp(11px, 1.8vw, 15px);
			background: rgba(0,0,0,0.4);
		}

		.schedule-table tr:hover td {
			background: var(--color-alpha10);
		}

		/* ─── انیمیشن‌ها ─── */
		@keyframes fadeInUp {
			from { opacity: 0; transform: translateY(25px); }
			to   { opacity: 1; transform: translateY(0); }
		}

		/* ─── ریسپانسیو موبایل ─── */
		@media (max-width: 768px) {
			body { padding: 10px 10px 75px; }

			.container { gap: 12px; }

			.quote-box {
				font-size: clamp(12px, 3.5vw, 16px);
				padding: 16px 20px 14px;
			}

			.quote-mark-open,
			.quote-mark-close { font-size: 42px; }

			.clock-section { padding: 18px 12px; }

			#clocktext { font-size: clamp(44px, 13vw, 100px); }

			.date-section {
				grid-template-columns: 1fr;
				gap: 10px;
				padding: 14px;
			}

			.date-value {
				font-size: clamp(12px, 3.5vw, 17px);
				white-space: normal;
			}

			.info-section,
			.info-section-row2 {
				grid-template-columns: 1fr;
				gap: 10px;
			}

			.info-box { min-height: 72px; padding: 14px 10px; }

			.info-text { font-size: clamp(13px, 3.2vw, 16px); }

			.info-value { font-size: clamp(15px, 4vw, 20px); }

			.modal-panel { padding: 18px 14px; }

			.schedule-table th,
			.schedule-table td { padding: 9px 8px; font-size: clamp(10px, 2.5vw, 13px); }
		}

		@media (max-width: 480px) {
			body { padding: 8px 8px 70px; }
			.container { gap: 10px; }
			#clocktext { font-size: clamp(38px, 13vw, 80px); }
		}

		@media (max-height: 600px) and (orientation: landscape) {
			body { padding: 8px 12px 65px; }
			.container { gap: 8px; }
			.clock-section, .info-box { padding: 10px; }
			.info-box { min-height: 55px; }
			#clocktext { font-size: clamp(36px, 10vw, 80px); }
		}
	</style>
</head>

<body>
	<div class="container">

		<!-- جمله انگیزشی -->
		<div class="quote-box" id="quoteBox">
			<span class="quote-mark-open" aria-hidden="true">"</span>
			<span class="quote-text" id="quoteText"></span>
			<span class="quote-author" id="quoteAuthor"></span>
			<span class="quote-mark-close" aria-hidden="true">"</span>
		</div>

		<!-- ساعت -->
		<div class="clock-section" id="clockSection">
			<span id="clocktext">۰۰:۰۰:۰۰</span>
		</div>

		<!-- تاریخ‌ها -->
		<div class="date-section">
			<div class="date-item">
				<div class="date-label">تاریخ شمسی</div>
				<div class="date-value" id="shamsiDate">در حال بارگذاری...</div>
			</div>
			<div class="date-item">
				<div class="date-label">تاریخ میلادی</div>
				<div class="date-value" id="miladiDate">در حال بارگذاری...</div>
			</div>
			<div class="date-item">
				<div class="date-label">تاریخ قمری</div>
				<div class="date-value" id="ghamariDate">در حال بارگذاری...</div>
			</div>
		</div>

		<!-- روزشمارها - ردیف اول -->
		<div class="info-section">
			<div id="daysPassed" class="info-box">
				<div class="info-text">امروز <span class="info-value" id="daysPassedVal">۰</span> امین روزیه که زندم</div>
			</div>
			<div id="daysToExam" class="info-box">
				<div class="info-text">تا شروع سال ۲۰۲۷ <span class="info-value" id="regVal">۰</span> روز مانده</div>
			</div>
			<div id="daysToExam2" class="info-box">
				<div class="info-text">تا امتحان زبان <span class="info-value" id="examVal">۰</span> روز مانده</div>
			</div>
		</div>

		<!-- روزشمارها - ردیف دوم -->
		<div class="info-section-row2">
			<div id="daysAlone" class="info-box">
				<div class="info-text">امروز <span class="info-value" id="aloneVal">۰</span> امین روزیه که تنهام</div>
			</div>
			<div id="daysBack" class="info-box">
				<div class="info-text">امروز <span class="info-value" id="backVal">۰</span> امین روزیه که برگشتم</div>
			</div>
			<div id="daysToChapter" class="info-box">
				<div class="info-text">تا پایان چپتر اول <span class="info-value" id="chapterVal">۰</span> روز مانده</div>
			</div>
		</div>
	</div>

	<!-- دکمه‌های کنترل -->
	<div class="controls-container">
		<button class="control-btn" id="toggleSeconds" title="نمایش/مخفی کردن ثانیه">⏱</button>
		<button class="control-btn" id="toggleSchedule" title="برنامه روزانه">☰</button>
		<button class="control-btn" id="toggleSettings" title="تنظیمات">⚙️</button>
	</div>

	<!-- Modal برنامه روزانه -->
	<div class="modal-overlay" id="scheduleOverlay">
		<div class="modal-panel wide" id="schedulePanel">
			<h2 class="modal-title" id="scheduleTitle">برنامه روزانه</h2>
			<table class="schedule-table" id="scheduleTable"></table>
			<div class="schedule-nav-row">
				<button class="close-btn nav-btn" id="leftArrowBtn" title="روز بعد">←</button>
				<button class="close-btn" id="closeSchedule">✕</button>

	<script>

	const studyPriorities = [

		['13:45 - 14:45', 'کتاب طاقچه'],
		['14:45 - 15:45', 'یوتیوب سمی دویچ'],
		['16:00 - 17:30', 'تمرین گرامر'],
		['17:30 - 18:30', 'کتاب‌های اشپغشن و هوغن'],

	// نگاشت شماره روز JS (۰=یکشنبه) به نام روز فارسی
	const jsDayToName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
	const persianDayNames = {
		Sunday: 'یکشنبه', Monday: 'دوشنبه', Tuesday: 'سه‌شنبه',
		Wednesday: 'چهارشنبه', Thursday: 'پنج‌شنبه', Friday: 'جمعه', Saturday: 'شنبه'
	};

	function toPersianTime(t) {
		return P(t);
	}

	function getDayRows() {
		// برنامه هر روز یکسان است
		return dailySchedule.map(([time, name]) => [toPersianTime(time), name]);
	}

	/* ═══════════════════════════════════════════
	   وضعیت برنامه
	═══════════════════════════════════════════ */
	const state = {
		showSeconds: false,
		currentColor: '#00FFFF',
		colorMode: 'auto',
		glowIntensity: 3,
		pulseIntensity: 30,
		dateGlowIntensity: 56,
		counterGlowIntensity: 8,
		animFrameId: null,
		lastDay: -1,
		scheduleDayIndex: null
	};

	/* ═══════════════════════════════════════════
	   المان‌ها
	═══════════════════════════════════════════ */
	const $ = id => document.getElementById(id);
	const clockEl      = $('clocktext');
	const clockSection = $('clockSection');
	const quoteBox     = $('quoteBox');
	const quoteText    = $('quoteText');
	const quoteAuthor  = $('quoteAuthor');
	const quoteMOpen   = quoteBox.querySelector('.quote-mark-open');
	const quoteMClose  = quoteBox.querySelector('.quote-mark-close');
	const shamsiEl     = $('shamsiDate');
	const miladiEl     = $('miladiDate');
	const ghamariEl    = $('ghamariDate');
	const daysPassedEl = $('daysPassedVal');
	const regEl        = $('regVal');
	const examEl       = $('examVal');
	const regBox       = $('daysToExam');
	const examBox      = $('daysToExam2');
	const aloneEl      = $('aloneVal');
	const backEl       = $('backVal');
	const chapterEl    = $('chapterVal');
	const chapterBox   = $('daysToChapter');

	/* ═══════════════════════════════════════════
	   ابزارها
	═══════════════════════════════════════════ */
	const P = n => String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
	const A = n => String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

	function hexToRgba(hex, a = 1) {
		const r = parseInt(hex.slice(1,3),16);
		const g = parseInt(hex.slice(3,5),16);
		const b = parseInt(hex.slice(5,7),16);
		return `rgba(${r},${g},${b},${a})`;
	}

	function hexToRgb(hex) {
		hex = hex.replace('#','');
		return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
	}

	function rgbToHex(rgb) {
		return '#' + rgb.map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
	}

	function lerpHex(a, b, t) {
		const ra = hexToRgb(a), rb = hexToRgb(b);
		return rgbToHex(ra.map((v,i) => v + (rb[i]-v)*t));
	}

	function getColorByTime() {
		const now = new Date();
		const m = now.getHours()*60 + now.getMinutes();
		if (m >= 240 && m < 660)  return '#00FF00';
		if (m >= 660 && m < 840)  return lerpHex('#00FF00','#FFFFFF',(m-660)/180);
		if (m >= 840 && m < 1080) return '#FFA500';
		if (m >= 1080 && m < 1200) return '#FFFF00';
		return '#00FFFF';
	}

	function getColorByDays(d) {
		if (d >= 100) return '#00FF00';
		if (d <= 0)   return '#FF0000';
		const ranges = [
			{hi:100,lo:80,hc:'#00FF00',lc:'#FFFFFF'},
			{hi:80, lo:50,hc:'#FFFFFF',lc:'#FFFF00'},
			{hi:50, lo:35,hc:'#FFFF00',lc:'#FFA500'},
			{hi:35, lo:0, hc:'#FFA500',lc:'#FF0000'}
		];
		for (const r of ranges) {
			if (d <= r.hi && d >= r.lo)
				return lerpHex(r.lc, r.hc, (d-r.lo)/(r.hi-r.lo));
		}
		return '#FF0000';
	}

	/* ═══════════════════════════════════════════
	   اعمال رنگ روی CSS variables
	═══════════════════════════════════════════ */
	function applyColor(color) {
		const r = hexToRgb(color);
		const root = document.documentElement.style;
		root.setProperty('--color', color);
		root.setProperty('--color-alpha50', hexToRgba(color, 0.5));
		root.setProperty('--color-alpha20', hexToRgba(color, 0.2));
		root.setProperty('--color-alpha10', hexToRgba(color, 0.1));
		root.setProperty('--color-alpha03', hexToRgba(color, 0.03));
		// رنگ علامت نقل‌قول
		quoteMOpen.style.color  = color;
		quoteMClose.style.color = color;
	}

	/* ═══════════════════════════════════════════
	   انیمیشن glow
	═══════════════════════════════════════════ */
	function startGlowLoop() {
		if (state.animFrameId) cancelAnimationFrame(state.animFrameId);

		const t0 = Date.now();

		function loop() {
			if (state.colorMode === 'auto') {
				const c = getColorByTime();
				if (c !== state.currentColor) {
					state.currentColor = c;
					applyColor(c);
				}
			}

			const gi = state.glowIntensity / 100;
			const pi = state.pulseIntensity / 100;
			const elapsed = (Date.now() - t0) % 2000 / 2000;
			const wave = pi > 0 ? Math.sin(elapsed * Math.PI * 2) * 0.5 + 0.5 : 0.5;
			const eff = gi + pi * 0.4 * wave;

			const c = state.currentColor;
			clockEl.style.textShadow = [10,20,40,80]
				.map(b => `0 0 ${b*eff}px ${c}`)
				.join(',');
			clockEl.style.color = c;

			state.animFrameId = requestAnimationFrame(loop);
		}

		loop();
	}

	/* ═══════════════════════════════════════════
	   به‌روزرسانی glow تاریخ
	═══════════════════════════════════════════ */
	function updateDateGlow() {
		const b = 8 * state.dateGlowIntensity / 100;
		document.querySelectorAll('.date-value').forEach(el => {
			el.style.textShadow = b > 0 ? `0 0 ${b}px rgba(255,255,255,${state.dateGlowIntensity/100})` : 'none';
		});
	}

	/* ═══════════════════════════════════════════
	   تبدیل تاریخ شمسی
	═══════════════════════════════════════════ */
	function toShamsi(d) {
		const gdm = [0,31,59,90,120,151,181,212,243,273,304,334];
		let gy = d.getFullYear(), gm = d.getMonth()+1, gd = d.getDate();
		const jy0 = gy <= 1600 ? 0 : 979;
		gy -= gy <= 1600 ? 621 : 1600;
		let days = 365*gy + Math.floor((gy+3)/4) - Math.floor((gy+99)/100)
				 + Math.floor((gy+399)/400) - 80 + gd + gdm[gm-1];
		if (gm > 2 && ((gy%4===0&&gy%100!==0)||(gy%400===0))) days++;
		let jy = jy0 + 33*Math.floor(days/12053);
		days %= 12053;
		jy += 4*Math.floor(days/1461);
		days %= 1461;
		jy += Math.floor((days-1)/365);
		if (days > 365) days = (days-1)%365;
		const jm = days < 186 ? 1+Math.floor(days/31) : 7+Math.floor((days-186)/30);
		const jd = 1 + (days < 186 ? days%31 : (days-186)%30);
		const months = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
		const days2 = ['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنج‌شنبه','جمعه','شنبه'];
		return `${days2[d.getDay()]}، ${P(jd)} ${months[jm-1]} ${P(jy)}`;
	}

	/* ═══════════════════════════════════════════
	   تبدیل تاریخ قمری
	═══════════════════════════════════════════ */
	function toGhamari(date) {
		const gy=date.getFullYear(), gm=date.getMonth()+1, gd=date.getDate();
		const a=Math.floor((14-gm)/12), y=gy+4800-a, m=gm+12*a-3;
		let jd=gd+Math.floor((153*m+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
		const l=jd-1948440+10632+1, n=Math.floor((l-1)/10631);
		let rem=l-10631*n+354;
		const jump=Math.floor((10985-rem)/5316)*Math.floor(50*rem/17719)+Math.floor(rem/5670)*Math.floor(43*rem/15238);
		rem=rem-Math.floor((30-jump)/15)*Math.floor(17719*jump/50)-Math.floor(jump/16)*Math.floor(15238*jump/43)+29;
		const hm=Math.floor(24*rem/709), hd=rem-Math.floor(709*hm/24), hy=30*n+jump-30;
		const months=['محرم','صفر','ربيع الأول','ربيع الثاني','جمادى الأولى','جمادى الثانية','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
		const wdays=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
		return `${wdays[date.getDay()]}، ${A(hd)} ${months[hm-1]} ${A(hy)}`;
	}

	/* ═══════════════════════════════════════════
	   به‌روزرسانی ساعت (هر ثانیه)
	═══════════════════════════════════════════ */
	function updateClock() {
		const now = new Date();
		const hh = String(now.getHours()).padStart(2,'0');
		const mm = String(now.getMinutes()).padStart(2,'0');
		const ss = String(now.getSeconds()).padStart(2,'0');
		clockEl.textContent = P(state.showSeconds ? `${hh}:${mm}:${ss}` : `${hh}:${mm}`);

		// تاریخ‌ها: فقط اگر روز عوض شده
		if (now.getDay() !== state.lastDay) {
			state.lastDay = now.getDay();

			shamsiEl.textContent = toShamsi(now);
			const en_days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
			const en_months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
			miladiEl.textContent = `${en_days[now.getDay()]}, ${now.getDate()} ${en_months[now.getMonth()]} ${now.getFullYear()}`;
			ghamariEl.textContent = toGhamari(now);

			// جمله انگیزشی روزانه
			const q = dailyQuotes[now.getDay()];
			quoteText.textContent = q.text;
			quoteAuthor.textContent = `— ${q.author}`;
		}

		// روزشمار زندگی
		const start = new Date('1999-11-10T00:00:00');
		daysPassedEl.textContent = P(Math.floor((now - start) / 86400000));

		// روزشمار تا شروع سال ۲۰۲۷
		const ci = state.counterGlowIntensity;
		const regDate = new Date('2027-01-01T00:00:00');
		const regDays = Math.ceil((regDate - now) / 86400000);
		if (regDays <= 0) {
			regBox.innerHTML = '<div class="info-text">سال ۲۰۲۷ آغاز شد! 🎉</div>';
			regBox.style.cssText = `border-color:#FF0000; box-shadow:0 0 20px rgba(255,0,0,0.5),inset 0 0 20px rgba(255,0,0,0.1)`;
		} else {
			const rc = getColorByDays(regDays);
			regEl.textContent = P(regDays);
			regEl.style.color = rc;
			regEl.style.textShadow = `0 0 ${15*ci/100}px ${rc}, 0 0 ${30*ci/100}px ${rc}`;
			regBox.style.borderColor = rc;
			regBox.style.boxShadow = `0 0 20px ${hexToRgba(rc,0.5)}, inset 0 0 20px ${hexToRgba(rc,0.1)}`;
		}

		// امتحان زبان
		const examDate = new Date('2026-08-30T00:00:00');
		const examDays = Math.ceil((examDate - now) / 86400000);
		if (examDays <= 0) {
			examBox.innerHTML = '<div class="info-text">امتحان زبان رسیده است! 🎯</div>';
			examBox.style.cssText = `border-color:#FF0000; box-shadow:0 0 20px rgba(255,0,0,0.5),inset 0 0 20px rgba(255,0,0,0.1)`;
		} else {
			const ec = getColorByDays(examDays);
			examEl.textContent = P(examDays);
			examEl.style.color = ec;
			examEl.style.textShadow = `0 0 ${15*ci/100}px ${ec}, 0 0 ${30*ci/100}px ${ec}`;
			examBox.style.borderColor = ec;
			examBox.style.boxShadow = `0 0 20px ${hexToRgba(ec,0.5)}, inset 0 0 20px ${hexToRgba(ec,0.1)}`;
		}

		// روزشمار تنهایی (بنفش - از 19 ژانویه 2026)
		const aloneStart = new Date('2026-01-19T00:00:00');
		const aloneDays = Math.floor((now - aloneStart) / 86400000);
		aloneEl.textContent = P(Math.max(0, aloneDays));
		aloneEl.style.textShadow = `0 0 ${15*ci/100}px #BF7FFF, 0 0 ${30*ci/100}px #9B30FF`;

		// روزشمار برگشت (آبی - از 3 می 2026)
		const backStart = new Date('2026-07-17T00:00:00');
		const backDays = Math.floor((now - backStart) / 86400000);
		backEl.textContent = P(Math.max(0, backDays));
		backEl.style.textShadow = `0 0 ${15*ci/100}px #6AB8FF, 0 0 ${30*ci/100}px #1E90FF`;

		// روزشمار چپتر اول (متغیر - تا 28 مارچ 2027)
		const chapterEnd = new Date('2027-03-28T00:00:00');
		const chapterDays = Math.ceil((chapterEnd - now) / 86400000);
		if (chapterDays <= 0) {
			chapterBox.innerHTML = '<div class="info-text">چپتر اول به پایان رسید! 🏁</div>';
			chapterBox.style.cssText = `border-color:#FF0000; box-shadow:0 0 20px rgba(255,0,0,0.5),inset 0 0 20px rgba(255,0,0,0.1)`;
		} else {
			const cc = getColorByDays(chapterDays);
			chapterEl.textContent = P(chapterDays);
			chapterEl.style.color = cc;
			chapterEl.style.textShadow = `0 0 ${15*ci/100}px ${cc}, 0 0 ${30*ci/100}px ${cc}`;
			chapterBox.style.borderColor = cc;
			chapterBox.style.boxShadow = `0 0 20px ${hexToRgba(cc,0.5)}, inset 0 0 20px ${hexToRgba(cc,0.1)}`;
		}

		// تایمر دقیق
		const delay = 1000 - (now.getTime() % 1000) + 15;
		setTimeout(updateClock, delay);
	}

	/* ═══════════════════════════════════════════

	function openModal(overlayId) {

	function buildSchedule(dayIndex) {
		if (dayIndex === undefined) dayIndex = new Date().getDay();
		dayIndex = ((dayIndex % 7) + 7) % 7; // wrap 0-6
		state.scheduleDayIndex = dayIndex;

		const dayName = jsDayToName[dayIndex];
		const isToday = dayIndex === new Date().getDay();

		$('scheduleTitle').innerHTML =
			`برنامه روز ${persianDayNames[dayName]}${isToday ? ' (امروز)' : ''}`;

		const rows = getDayRows()
			.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`)
			.join('');

		const sleepInfo = `
			<div style="margin-bottom:18px; padding:14px 16px; background:rgba(255,255,255,0.05); border-radius:12px; border:1px solid var(--color-alpha20); display:flex; flex-wrap:wrap; gap:14px; justify-content:center; font-size:clamp(12px,2vw,15px);">
				<span>🌙 خواب: <strong style="color:var(--color);">${toPersianTime(sleepSchedule.sleep_time)}</strong></span>
				<span>☀️ بیداری: <strong style="color:var(--color);">${toPersianTime(sleepSchedule.wake_time)}</strong></span>
				<span>🧘 روتین صبحگاهی: <strong style="color:var(--color);">${toPersianTime(sleepSchedule.morning_routine)}</strong></span>
			</div>
		`;

		$('scheduleTable').innerHTML = `<thead><tr><th>زمان</th><th>فعالیت</th></tr></thead><tbody>${rows}</tbody>`;

		$('schedulePanel').querySelectorAll('.sleep-info, .study-priorities-box').forEach(el => el.remove());

		const sleepDiv = document.createElement('div');
		sleepDiv.className = 'sleep-info';
		sleepDiv.innerHTML = sleepInfo;
		$('scheduleTable').insertAdjacentElement('beforebegin', sleepDiv);

		const prioritiesDiv = document.createElement('div');
		prioritiesDiv.className = 'study-priorities-box';
		prioritiesDiv.innerHTML = `<strong style="color:var(--color);">📌 اولویت‌های مطالعه:</strong><ul>${studyPriorities.map(p => `<li>${p}</li>`).join('')}</ul>`;
		$('scheduleTable').insertAdjacentElement('afterend', prioritiesDiv);
	}

	$('toggleSchedule').addEventListener('click', () => {
		if ($('scheduleOverlay').classList.contains('active')) closeAllModals();
		else { buildSchedule(new Date().getDay()); openModal('scheduleOverlay'); }
	});

	$('closeSchedule').addEventListener('click', closeAllModals);

	$('scheduleOverlay').addEventListener('click', e => {
		if (e.target === $('scheduleOverlay')) closeAllModals();
	});

	// فلش راست = روز قبل (مثلاً اگر امروز یکشنبه، فلش راست شنبه را نشان می‌دهد)
	$('rightArrowBtn').addEventListener('click', () => {
		buildSchedule(state.scheduleDayIndex - 1);
	});

	// فلش چپ = روز بعد (مثلاً اگر امروز یکشنبه، فلش چپ دوشنبه را نشان می‌دهد)
	$('leftArrowBtn').addEventListener('click', () => {
		buildSchedule(state.scheduleDayIndex + 1);
	});

	$('toggleSettings').addEventListener('click', () => {
		if ($('settingsOverlay').classList.contains('active')) closeAllModals();
		else openModal('settingsOverlay');
	});

	$('closeSettings').addEventListener('click', closeAllModals);

	$('settingsOverlay').addEventListener('click', e => {
		if (e.target === $('settingsOverlay')) closeAllModals();
	});

	/* ═══════════════════════════════════════════
	   کنترل‌های تنظیمات
	═══════════════════════════════════════════ */
	$('toggleSeconds').addEventListener('click', () => {
		state.showSeconds = !state.showSeconds;
		$('toggleSeconds').style.opacity = state.showSeconds ? '1' : '0.5';
	});
	$('toggleSeconds').style.opacity = '0.5';

	$('glowIntensity').addEventListener('input', e => {
		state.glowIntensity = +e.target.value;
	});

	$('pulseIntensity').addEventListener('input', e => {
		state.pulseIntensity = +e.target.value;
	});

	$('dateGlowIntensity').addEventListener('input', e => {
		state.dateGlowIntensity = +e.target.value;
		updateDateGlow();
	});

	$('counterGlowIntensity').addEventListener('input', e => {
		state.counterGlowIntensity = +e.target.value;
	});

	$('autoModeBtn').addEventListener('click', () => {
		state.colorMode = 'auto';
		$('autoModeBtn').classList.add('active');
		$('manualModeBtn').classList.remove('active');
		$('colorOptions').style.opacity = '0.5';
		$('colorOptions').style.pointerEvents = 'none';
	});

	$('manualModeBtn').addEventListener('click', () => {
		state.colorMode = 'manual';
		$('manualModeBtn').classList.add('active');
		$('autoModeBtn').classList.remove('active');
		$('colorOptions').style.opacity = '1';
		$('colorOptions').style.pointerEvents = 'auto';
	});

	document.querySelectorAll('.color-option').forEach(opt => {
		opt.addEventListener('click', () => {
			if (state.colorMode !== 'manual') return;
			document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
			opt.classList.add('active');
			state.currentColor = opt.dataset.color;
			applyColor(state.currentColor);
		});
	});

	/* ═══════════════════════════════════════════
	   راه‌اندازی
	═══════════════════════════════════════════ */
	// رنگ اولیه
	if (state.colorMode === 'auto') {
		state.currentColor = getColorByTime();
	}
	applyColor(state.currentColor);
	startGlowLoop();
	updateDateGlow();
	updateClock();
	</script>
</body>
</html>
